<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=430, initial-scale=1.0" />
  <title>VR 스타일 | 집리셋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/vr-scan.css" />
</head>
<body>
  <div class="page-wrap">

    <!-- header -->
    <header class="vr-header">
      <a href="javascript:history.back()" class="vr-header-back">&#60;</a>
      <div class="vr-header-logo">
        <img src="images/logo-r.png" alt="집리셋" />
      </div>
      <div class="vr-header-icons">
        <img src="images/vr-icon-cart.svg"   alt="장바구니" class="vr-header-icon" />
        <img src="images/vr-icon-search.svg" alt="검색"     class="vr-header-icon vr-header-icon--search" />
        <img src="images/vr-icon-bell.svg"   alt="알림"     class="vr-header-icon" />
      </div>
    </header>

    <!-- page title -->
    <div class="vr-page-title">
      <h1 class="vr-title-main">공간 분석 기반 가상 배치</h1>
      <p class="vr-title-sub">공간 분석을 통해 사용자 취향에 맞는 인테리어를 제안합니다.</p>
    </div>

    <!-- VR visual -->
    <div class="vr-visual">
      <img src="images/vr-ai-bg.png" alt="공간 분석 이미지" class="vr-visual-img" />
      <div class="vr-visual-overlay">
        <div class="vr-scan-frame">
          <div class="vr-scan-inner"></div>
        </div>
        <div class="vr-scan-info">
          <div class="vr-scan-info-item">
            <img src="images/vr-scan-icon2.svg" alt="" class="vr-scan-info-icon" />
            <span>스캔 면적: 18.5m</span>
          </div>
          <div class="vr-scan-info-item">
            <img src="images/vr-wall-icon2.svg" alt="" class="vr-scan-info-icon vr-scan-info-icon--wall" />
            <span>벽면 검지: 4곳</span>
          </div>
        </div>
      </div>
    </div>

    <!-- furniture section -->
    <section class="vr-furniture-section">
      <div class="vr-furniture-header">
        <h2 class="vr-furniture-title">내 공간에 딱 맞는 가구</h2>
        <a href="#" class="vr-furniture-more">
          전체보기
          <img src="images/vr-arrow-icon.png" alt="" />
        </a>
      </div>

      <div class="vr-card-list">

        <!-- card 1 -->
        <div class="vr-item-card">
          <div class="vr-item-img-wrap">
            <div class="vr-item-img-clip">
              <img src="images/Velvet-img1.png" alt="벨벳 3인용 소파" class="vr-item-img vr-item-img--1" />
              <button class="vr-heart-btn" aria-label="찜하기">
                <img src="images/vr-heart-icon.png" alt="" />
              </button>
            </div>
          </div>
          <p class="vr-item-name">벨벳 3인용 소파</p>
          <p class="vr-item-price"><em>1,059,000</em>원</p>
          <button class="vr-place-btn">
            <img src="images/vr-place-icon.png" alt="" />배치하기
          </button>
        </div>

        <!-- card 2 -->
        <div class="vr-item-card">
          <div class="vr-item-img-wrap">
            <div class="vr-item-img-clip vr-item-img-clip--2">
              <img src="images/Velvet-img2.png" alt="3단 서랍장" class="vr-item-img vr-item-img--2" />
              <button class="vr-heart-btn vr-heart-btn--2" aria-label="찜하기">
                <img src="images/vr-heart-icon.png" alt="" />
              </button>
            </div>
          </div>
          <p class="vr-item-name">3단 서랍장</p>
          <p class="vr-item-price"><em>565,500</em>원</p>
          <button class="vr-place-btn">
            <img src="images/vr-place-icon.png" alt="" />배치하기
          </button>
        </div>

        <!-- card 3 -->
        <div class="vr-item-card">
          <div class="vr-item-img-wrap">
            <div class="vr-item-img-clip vr-item-img-clip--3">
              <img src="images/Velvet-img3.png" alt="옷장" class="vr-item-img vr-item-img--3" />
            </div>
          </div>
          <p class="vr-item-name">옷장</p>
          <p class="vr-item-price"><em>1,130,000</em>원</p>
          <button class="vr-place-btn">
            <img src="images/vr-place-icon.png" alt="" />배치하기
          </button>
        </div>

        <!-- card 4 -->
        <div class="vr-item-card">
          <div class="vr-item-img-wrap">
            <div class="vr-item-img-clip vr-item-img-clip--4">
              <img src="images/Velvet-img4.png" alt="멀티수납 조명화장대" class="vr-item-img vr-item-img--4" />
              <button class="vr-heart-btn" aria-label="찜하기">
                <img src="images/vr-heart-icon.png" alt="" />
              </button>
            </div>
          </div>
          <p class="vr-item-name">멀티수납 조명화장대</p>
          <p class="vr-item-price"><em>829,000</em>원</p>
          <button class="vr-place-btn vr-place-btn--alt">
            <img src="images/vr-place-icon.png" alt="" />배치하기
          </button>
        </div>

      </div>
    </section>

    <!-- bottom nav -->
    <nav class="bottom-nav">
      <div class="nav-inner">
        <a href="index.html" class="nav-item">
          <img src="images/nav-home-mp.png" alt="홈" class="nav-icon">
          <span>홈</span>
        </a>
        <div class="nav-item">
          <img src="images/nav-cate-mp.svg" alt="카테고리" class="nav-icon">
          <span>카테고리</span>
        </div>
        <div class="nav-item">
          <img src="images/nav-biuom-mp.svg" alt="비움" class="nav-icon">
          <span>비움</span>
        </div>
        <div class="nav-item active">
          <img src="images/nav-cwoom-mp.svg" alt="채움" class="nav-icon">
          <span>채움</span>
        </div>
        <a href="mypage.html" class="nav-item">
          <img src="images/nav-my-mp.svg" alt="마이" class="nav-icon nav-icon--white">
          <span>마이</span>
        </a>
      </div>
    </nav>

  </div>
</body>
</html>
