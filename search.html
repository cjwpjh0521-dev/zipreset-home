<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>검색 — 집리셋</title>
  <link rel="stylesheet" href="css/search.css">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="집리셋" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
</head>
<body>
  <div class="screen">

    <!-- 검색 헤더 -->
    <header class="search-header">
      <a class="back-btn" href="/home">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div class="search-bar">
        <input class="search-input" type="text" placeholder="검색어를 입력해 주세요">
        <button class="search-icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        </button>
      </div>
    </header>

    <main>

      <!-- 최근 검색어 -->
      <section class="section">
        <h2 class="section-title">최근 검색어</h2>
        <div class="keyword-chips">
          <span class="chip">러그</span>
          <span class="chip">더프리그</span>
          <span class="chip">노미아</span>
          <span class="chip">패브릭</span>
          <span class="chip">행거</span>
          <span class="chip">침대</span>
          <span class="chip">소파</span>
          <span class="chip">수납장</span>
          <span class="chip">식탁</span>
          <span class="chip">책장</span>
          <span class="chip">샘키즈</span>
          <span class="chip">서랍장</span>
          <span class="chip">거실러그</span>
        </div>
      </section>

      <!-- 인기 검색어 -->
      <section class="section">
        <div class="section-title-row">
          <h2 class="section-title">인기 검색어</h2>
          <span class="section-date">2026.4.21 15:00 기준</span>
        </div>
        <div class="ranking-grid">
          <div class="ranking-item">
            <span class="rank-num">1</span>
            <span class="rank-new">NEW</span>
            <span class="rank-name">모듈소파</span>
          </div>
          <div class="ranking-item">
            <span class="rank-num">2</span>
            <span class="rank-new">NEW</span>
            <span class="rank-name">미드센추리 모던</span>
          </div>
          <div class="ranking-item">
            <span class="rank-num">3</span>
            <span class="rank-new">NEW</span>
            <span class="rank-name">1인 리클라이너</span>
          </div>
          <div class="ranking-item">
            <span class="rank-num">3</span>
            <span class="rank-new">NEW</span>
            <span class="rank-name">벽걸이 선반</span>
          </div>
          <div class="ranking-item">
            <span class="rank-num">4</span>
            <span class="rank-new">NEW</span>
            <span class="rank-name">홈오피스 데스크</span>
          </div>
          <div class="ranking-item">
            <span class="rank-num">5</span>
            <span class="rank-new">NEW</span>
            <span class="rank-name">러그 200x300</span>
          </div>
          <div class="ranking-item">
            <span class="rank-num">6</span>
            <span class="rank-new">NEW</span>
            <span class="rank-name">TV장</span>
          </div>
          <div class="ranking-item">
            <span class="rank-num">7</span>
            <span class="rank-new">NEW</span>
            <span class="rank-name">선반</span>
          </div>
        </div>
      </section>

      <!-- AI추천 검색어 -->
      <section class="section">
        <div class="section-title-row">
          <h2 class="section-title">AI추천 검색어</h2>
          <span class="beta-badge">BETA</span>
        </div>
        <div class="keyword-chips">
          <span class="chip">의자</span>
          <span class="chip">러그</span>
          <span class="chip">쓰레기통</span>
          <span class="chip">현관매트</span>
        </div>
      </section>

    </main>
  </div>
</body>
</html>
