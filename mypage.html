<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>마이페이지 — 집리셋</title>
  <link rel="stylesheet" href="css/mypage.css">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="집리셋" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
</head>
<body>
  <div class="screen">

    <!-- 헤더 -->
    <header class="header">
      <div class="logo">
        <span class="logo-txt">ZIP</span>
        <img src="images/logo-r-mark.svg" alt="R" class="logo-r">
        <span class="logo-txt">ESET</span>
      </div>
      <div class="header-icons">
        <img src="images/icon-cart-mypage.svg" alt="장바구니" style="width:24px;height:24px;object-fit:contain;">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      </div>
    </header>

    <main>

      <!-- 프로필 카드 -->
      <div class="profile-card">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar">
            <img src="images/profile-avatar.png" alt="프로필 아바타" style="width:100%;height:100%;object-fit:cover;">
          </div>
          <button class="edit-btn">
            <svg viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2-7 7H1.5v-2l7-7z" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="profile-info">
          <div class="profile-name-row">
            <span class="profile-name">김희망</span>
            <span class="profile-role">Estate Curator</span>
          </div>
          <p class="profile-email">kim.curator@example.com</p>
          <button class="btn-manage">내 정보 관리</button>
        </div>
      </div>

      <!-- 주문 관리 -->
      <section class="menu-section">
        <h2 class="menu-section-title">주문 관리</h2>
        <div class="menu-grid">
          <a href="#" class="menu-link">주문·배송 내역</a>
          <a href="#" class="menu-link">취소·반품·교환 내역</a>
          <a href="#" class="menu-link">계단운반비 조회</a>
        </div>
        <hr class="divider">
      </section>

      <!-- 나의 혜택 -->
      <section class="menu-section">
        <h2 class="menu-section-title">나의 혜택</h2>
        <div class="menu-grid">
          <a href="#" class="menu-link">쿠폰, 포인트</a>
          <a href="#" class="menu-link">쿠폰, 포인트 선물</a>
          <a href="#" class="menu-link">상품권</a>
        </div>
        <hr class="divider">
      </section>

      <!-- 나의 활동 -->
      <section class="menu-section">
        <h2 class="menu-section-title">나의 활동</h2>
        <div class="menu-grid menu-grid-2col">
          <div class="menu-col">
            <a href="#" class="menu-link">찜</a>
            <a href="#" class="menu-link">상품 후기</a>
            <a href="#" class="menu-link">상품문의</a>
          </div>
          <div class="menu-col">
            <a href="#" class="menu-link">최근 본 상품</a>
            <a href="#" class="menu-link">재입고 알림 신청 내역</a>
          </div>
        </div>
        <hr class="divider">
      </section>

      <!-- 고객센터 -->
      <section class="menu-section">
        <h2 class="menu-section-title">고객센터 <span class="arrow">&gt;</span></h2>
        <div class="menu-grid">
          <a href="#" class="menu-link">1:1 문의</a>
          <a href="#" class="menu-link">A/S 문의</a>
          <a href="#" class="menu-link">설정</a>
          <a href="#" class="menu-link">공지사항</a>
        </div>
        <hr class="divider">
      </section>

    </main>

    <!-- 하단 내비게이션 -->
    <nav class="bottom-nav">
      <div class="nav-inner">
        <a href="/home" class="nav-item">
          <img src="images/nav-home-mp.png" alt="홈" class="nav-icon">
          <span>홈</span>
        </a>
        <div class="nav-item">
          <img src="images/nav-biuom-mp.svg" alt="비움" class="nav-icon">
          <span>비움</span>
        </div>
        <div class="nav-item">
          <img src="images/nav-cate-mp.svg" alt="카테고리" class="nav-icon">
          <span>카테고리</span>
        </div>
        <div class="nav-item">
          <img src="images/nav-cwoom-mp.svg" alt="채움" class="nav-icon">
          <span>채움</span>
        </div>
        <div class="nav-item active">
          <img src="images/nav-my-mp.svg" alt="마이" class="nav-icon">
          <span>마이</span>
        </div>
      </div>
    </nav>

  </div>
</body>
</html>
