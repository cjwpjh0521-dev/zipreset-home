<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>AI 가구 분석 — 집리셋</title>
  <link rel="stylesheet" href="css/ai-analysis.css">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="집리셋" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
</head>
<body>
  <div class="screen">

    <!-- 헤더 -->
    <header class="ai-header">
      <a class="back-btn" href="javascript:history.back()">&lt;</a>
      <div class="header-logo"></div>
      <div class="header-icons">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.97-1.67L23 6H6"/></svg>
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      </div>
    </header>

    <!-- 타이틀 -->
    <div class="title-box">
      <h1 class="title-main">가구 상태 분석 및 비움</h1>
      <p class="title-sub">촬영 시 AI가 즉시 가치를 평가합니다.</p>
    </div>

    <!-- 스캐너 비주얼 -->
    <div class="visual-wrap">
      <!-- 배경 이미지 -->
      <div class="visual-bg-wrap" aria-hidden="true">
        <div class="visual-bg-white"></div>
        <div class="visual-bg-img-wrap">
          <img class="visual-bg-img" src="images/custom-img.png" alt="">
        </div>
      </div>
      <div class="visual-overlay"></div>

      <div class="scanner-area">
        <div class="scanner-frame">
          <!-- 오렌지 코너 액센트 -->
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>

          <!-- 스캔 라인 -->
          <div class="scan-line"></div>

          <!-- 프레임 상태 배지 (좌측) -->
          <div class="badge badge-frame">
            <span class="badge-top">[프레임 상태]</span>
            <span class="badge-bottom">최상</span>
          </div>

          <!-- 마모도 배지 (우측) -->
          <div class="badge badge-wear">
            <span class="badge-top">[마모도]</span>
            <span class="badge-bottom">3.5% 수준</span>
          </div>

          <!-- 카메라 버튼 -->
          <button class="camera-btn">
            <span class="camera-inner">
              <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
            </span>
          </button>
        </div>

        <p class="guide-text">수평을 맞춰 촬영하세요</p>
      </div>
    </div>

    <!-- 정보 카드 -->
    <div class="info-cards">
      <div class="info-card">
        <p class="info-label">예상 매입가</p>
        <p class="info-value">125,000</p>
        <div class="info-sub-row">
          <span class="info-sub">시제 대비 상위 15%</span>
          <img src="images/aa-icon1.svg" alt="" class="info-icon">
        </div>
      </div>
      <div class="info-card">
        <p class="info-label">처분 난이도</p>
        <div class="info-value-row">
          <span class="info-value">쉬움</span>
          <div class="dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
        <div class="info-sub-row">
          <span class="info-sub">시제 대비 상위 15%</span>
          <img src="images/aa-icon2.svg" alt="" class="info-icon">
        </div>
      </div>
    </div>

    <!-- 버튼 -->
    <div class="btn-area">
      <button class="btn-primary">즉시 수거 신청하기</button>
      <p class="btn-note">* AI 분석 결과는 실제 방문 시 변동될 수 있습니다.</p>
    </div>

  </div>
</body>
</html>
