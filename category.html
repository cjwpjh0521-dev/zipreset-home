  <script>
    // 모든 링크 클릭 강제 처리 (모바일 버그 대응)
    document.querySelectorAll('a[href]').forEach(function(el) {
      el.addEventListener('click', function(e) {
        var href = this.getAttribute('href');
        if (href && href !== '#') {
          e.preventDefault();
          e.stopPropagation();
          window.location.href = href;
        }
      });
    });
  </script>
