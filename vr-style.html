<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>VR 스타일 — 집리셋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/vr-style.css?v=3">
</head>
<body>
  <div class="page-wrap">

    <!-- ─── 헤더 ─── -->
    <header class="vr-header">
      <a href="javascript:history.back()" class="vr-header-back">&#60;</a>
      <div class="vr-header-logo"></div>
      <div class="vr-header-icons">
        <img src="images/vr-header-cart.png" alt="장바구니" class="vr-header-icon">
        <img src="images/vr-header-search.png" alt="검색" class="vr-header-icon">
        <img src="images/vr-header-bell.png" alt="알림" class="vr-header-icon">
      </div>
    </header>

    <!-- ─── 페이지 타이틀 ─── -->
    <div class="vr-page-title">
      <p class="vr-title-main">공간 분석 기반 가상 배치</p>
      <p class="vr-title-sub">공간 분석을 통해 사용자 취향에 맞는 인테리어를 제안합니다.</p>
    </div>

    <!-- ─── VR 비주얼 ─── -->
    <section class="vr-visual">
      <!-- 배경 이미지 -->
      <img src="images/vr-ai-bg.png" alt="공간 분석" class="vr-visual-img">
      <!-- 어두운 오버레이 -->
      <div class="vr-visual-overlay"></div>
      <!-- 스캐닝 프레임 -->
      <div class="vr-scan-frame">
        <div class="vr-scan-inner"></div>
      </div>
      <!-- 스캔 정보 바 -->
      <div class="vr-scan-info">
        <div class="vr-scan-info-item">
          <img src="images/vr-scan-icon.png" alt="" class="vr-scan-info-icon">
          <span>스캔 면적: 18.5m</span>
        </div>
        <div class="vr-scan-info-item">
          <img src="images/vr-wall-icon.png" alt="" class="vr-scan-info-icon">
          <span>벽면 검지: 4곳</span>
        </div>
      </div>
    </section>

    <!-- ─── 내 공간에 딱 맞는 가구 ─── -->
    <section class="vr-furniture-section">
      <!-- 섹션 타이틀 -->
      <div class="vr-furniture-header">
        <span class="vr-furniture-title">내 공간에 딱 맞는 가구</span>
        <a href="#" class="vr-furniture-more">
          전체보기
          <img src="images/vr-arrow-icon.png" alt="">
        </a>
      </div>

      <!-- 상품 카드 가로 스크롤 -->
      <div class="vr-card-list">

        <!-- 카드 1: 벨벳 3인용 소파 -->
        <div class="vr-item-card">
          <div class="vr-item-img-wrap">
            <img src="images/vr-sofa.png" alt="벨벳 3인용 소파" class="vr-item-img">
            <button class="vr-heart-btn">
              <img src="images/vr-heart-icon.png" alt="찜">
            </button>
          </div>
          <p class="vr-item-name">벨벳 3인용 소파</p>
          <p class="vr-item-price"><em>1,059,000</em>원</p>
          <button class="vr-place-btn" onclick="openARModal()">
            <img src="images/vr-place-icon.png" alt="">
            배치하기
          </button>
        </div>

        <!-- 카드 2: 3단 서랍장 -->
        <div class="vr-item-card">
          <div class="vr-item-img-wrap">
            <img src="images/vr-drawer.png" alt="3단 서랍장" class="vr-item-img">
            <button class="vr-heart-btn">
              <img src="images/vr-heart-icon.png" alt="찜">
            </button>
          </div>
          <p class="vr-item-name">3단 서랍장</p>
          <p class="vr-item-price"><em>565,500</em>원</p>
          <button class="vr-place-btn" onclick="openARModal()">
            <img src="images/vr-place-icon.png" alt="">
            배치하기
          </button>
        </div>

        <!-- 카드 3: 옷장 -->
        <div class="vr-item-card">
          <div class="vr-item-img-wrap">
            <img src="images/vr-wardrobe.png" alt="옷장" class="vr-item-img">
            <button class="vr-heart-btn">
              <img src="images/vr-heart-icon.png" alt="찜">
            </button>
          </div>
          <p class="vr-item-name">옷장</p>
          <p class="vr-item-price"><em>1,130,000</em>원</p>
          <button class="vr-place-btn" onclick="openARModal()">
            <img src="images/vr-place-icon.png" alt="">
            배치하기
          </button>
        </div>

        <!-- 카드 4: 멀티수납 조명화장대 -->
        <div class="vr-item-card">
          <div class="vr-item-img-wrap">
            <img src="images/vr-vanity.png" alt="멀티수납 조명화장대" class="vr-item-img">
            <button class="vr-heart-btn">
              <img src="images/vr-heart-icon.png" alt="찜">
            </button>
          </div>
          <p class="vr-item-name">멀티수납 조명화장대</p>
          <p class="vr-item-price"><em>829,000</em>원</p>
          <button class="vr-place-btn vr-place-btn--alt" onclick="openARModal()">
            <img src="images/vr-place-icon.png" alt="">
            배치하기
          </button>
        </div>

      </div>
    </section>

    <!-- ─── AR 배치 모달 ─── -->
    <div id="ar-modal" class="ar-modal-backdrop" onclick="closeARModal()" style="display:none;">
      <div class="ar-modal" onclick="event.stopPropagation()">
        <div class="ar-modal-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="#fff3ea"/>
            <rect x="14" y="20" width="20" height="16" rx="2" stroke="#ff8732" stroke-width="2"/>
            <path d="M19 20v-3a5 5 0 0110 0v3" stroke="#ff8732" stroke-width="2" stroke-linecap="round"/>
            <circle cx="24" cy="28" r="2.5" fill="#ff8732"/>
          </svg>
        </div>
        <p class="ar-modal-title">AR 배치 기능</p>
        <p class="ar-modal-desc">스마트폰 카메라로 실제 공간에 가구를<br>가상으로 배치해볼 수 있습니다.<br><br>앱 출시 후 이용 가능합니다.</p>
        <button class="ar-modal-btn" onclick="closeARModal()">확인</button>
      </div>
    </div>

    <!-- ─── 하단 네비게이션 ─── -->
    <nav class="vr-bottom-nav">
      <a href="index.html" class="vr-nav-item">
        <img src="images/vr-nav-home.png" alt="홈">
        <span>홈</span>
      </a>
      <a href="category.html" class="vr-nav-item">
        <img src="images/vr-nav-category.png" alt="카테고리">
        <span>카테고리</span>
      </a>
      <a href="#" class="vr-nav-item">
        <img src="images/vr-nav-bium.png" alt="비움">
        <span>비움</span>
      </a>
      <a href="#" class="vr-nav-item vr-nav-item--active">
        <img src="images/vr-nav-chaeum.png" alt="채움">
        <span>채움</span>
      </a>
      <a href="mypage.html" class="vr-nav-item">
        <img src="images/vr-nav-my.png" alt="마이">
        <span>마이</span>
      </a>
    </nav>

  </div>
  <style>
    .ar-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ar-modal {
      background: #fff;
      border-radius: 20px;
      width: 300px;
      padding: 32px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    .ar-modal-icon { margin-bottom: 4px; }
    .ar-modal-title {
      font-size: 17px;
      font-weight: 700;
      color: #000;
    }
    .ar-modal-desc {
      font-size: 13px;
      font-weight: 400;
      color: #555;
      line-height: 1.6;
    }
    .ar-modal-btn {
      margin-top: 8px;
      width: 100%;
      height: 46px;
      background: #ff8732;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }
  </style>
  <script>
    function openARModal() {
      document.getElementById('ar-modal').style.display = 'flex';
    }
    function closeARModal() {
      document.getElementById('ar-modal').style.display = 'none';
    }
  </script>
</body>
</html>
