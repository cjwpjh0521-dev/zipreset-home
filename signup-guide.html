<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>회원가입 안내 — 집리셋</title>
  <link rel="stylesheet" href="css/signup-guide.css">
</head>
<body>
  <div class="overlay">
    <div class="modal">

      <!-- 타이틀 -->
      <div class="modal-title-wrap">
        <p class="modal-title">회원가입 안내</p>
      </div>

      <!-- 안내 텍스트 -->
      <div class="modal-text-wrap">
        <p class="modal-text">사이트 이용을 위해서는 회원가입이 필요합니다. 회원가입 페이지로 이동하시겠습니까?</p>
      </div>

      <!-- 버튼 -->
      <div class="modal-btn-wrap">
        <button class="btn btn-cancel">취소</button>
        <a href="#" class="btn btn-signup">회원가입 하기</a>
      </div>

    </div>
  </div>
</body>
</html>
